<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0B2FAC 0%, #1e40af 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-box {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .lock-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .lock-title {
    font-size: 20px;
    font-weight: 800;
    color: #0B2FAC;
    margin-bottom: 6px;
  }
  .lock-sub {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 28px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 14px;
    letter-spacing: 2px;
    text-align: center;
  }
  input:focus { border-color: #0B2FAC; }
  button {
    width: 100%;
    padding: 12px;
    background: #0B2FAC;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #1a45cc; }
  .error {
    color: #e0284a;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .brand {
    margin-top: 28px;
    font-size: 11px;
    color: #9ca3af;
    letter-spacing: .5px;
  }
</style>
</head>
